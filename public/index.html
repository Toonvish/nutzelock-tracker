<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuzlocke Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-head">
          <h1>🎮 Nuzlocke</h1>
          <button id="new-run-btn" class="btn primary">+ New run</button>
        </div>
        <ul id="run-list" class="run-list"></ul>
      </aside>

      <main id="main">
        <div id="empty-state">
          <p>No run selected.</p>
          <p class="muted">Create a run on the left to start tracking encounters.</p>
        </div>

        <section id="run-view" hidden>
          <header class="run-header">
            <div>
              <h2 id="run-title"></h2>
              <p id="run-subtitle" class="muted"></p>
            </div>
            <div class="run-header-actions">
              <span id="sync-dot" class="sync-dot" title="Live sync"></span>
              <button
                id="clone-run-btn"
                class="btn"
                title="Start a new run with the same routes &amp; settings — encounters cleared"
              >
                ↻ New run (keep routes)
              </button>
              <button id="delete-run-btn" class="btn danger">Delete run</button>
            </div>
          </header>

          <!-- Lock screen for password-protected runs (shown until unlocked) -->
          <div id="locked-view" class="locked" hidden>
            <p>🔒 This session is password-protected.</p>
            <form id="unlock-form" class="unlock">
              <input id="unlock-input" type="password" placeholder="Password" autocomplete="off" />
              <button type="submit" class="btn primary">Unlock</button>
            </form>
          </div>

          <div id="routes-section">
            <form id="add-route-form" class="add-route">
              <input
                id="route-name-input"
                type="text"
                placeholder="Add a route (e.g. Route 1, Viridian Forest)…"
                autocomplete="off"
              />
              <button type="submit" class="btn primary">+ Add route</button>
            </form>

            <div id="routes-area"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
